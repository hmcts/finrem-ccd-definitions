# OVERRIDE VALUES IF pr-values:wa label is applied

xui-webapp:
  enabled: true
  nodejs:
    imagePullPolicy: Always
    image: hmctsprod.azurecr.io/xui/webapp:pr-5225
    environment:
      HEALTH_ROLE_ASSIGNMENT_API: http://${SERVICE_NAME}-am-role-assignment-service/health
      SERVICES_WORK_ALLOCATION_TASK_API: http://${SERVICE_NAME}-wa-task-management-api
      SERVICES_WA_WORKFLOW_API_URL: http://${SERVICE_NAME}-wa-workflow-api
      SERVICES_ROLE_ASSIGNMENT_API: http://${SERVICE_NAME}-am-role-assignment-service
      SERVICES_ROLE_ASSIGNMENT_MAPPING_API: http://${SERVICE_NAME}-am-org-role-mapping-service
      WA_SUPPORTED_JURISDICTIONS: DIVORCE
      FINREM_WORK_ALLOCATION_ENABLED: ${ENABLE_WA}
      GLOBAL_SEARCH_SERVICES: "IA,CIVIL,PRIVATELAW,PUBLICLAW,EMPLOYMENT,ST_CIC,DIVORCE"

ccd-data-store-api:
  enabled: ${ENABLE_WA}
  java:
    disableKeyVaults: true
    autoscaling:
      enabled: false
    imagePullPolicy: Always
    image: hmctsprod.azurecr.io/ccd/data-store-api:latest
    devmemoryRequests: 1024Mi
    devcpuRequests: 2000m
    devmemoryLimits: 2058Mi
    devcpuLimits: 2000m
    environment:
      DATA_STORE_DB_HOST: '{{ tpl .Values.global.postgresHostname $}}'
      DATA_STORE_IDAM_KEY: ${DATA_STORE_S2S_KEY}
      DATA_STORE_S2S_AUTHORISED_SERVICES: ccd_gw,ccd_gateway,fpl_case_service,ccd_data,ccd_ps,aac_manage_case_assignment,xui_webapp,ccd_case_document_am_api,divorce_ccd_submission,divorce_frontend,finrem_case_orchestration,finrem_citizen_ui,wa_workflow_api,wa_task_configuration_api,wa_task_management_api,wa_task_monitor,wa_case_event_handler,am_role_assignment_service
      CCD_S2S_AUTHORISED_SERVICES_CASE_USER_ROLES: aac_manage_case_assignment,fpl_case_service,finrem_case_orchestration,iac,divorce_frontend,civil_service,finrem_citizen_ui
      IDAM_API_BASE_URL: https://idam-api.aat.platform.hmcts.net
      IDAM_OIDC_URL: https://idam-web-public.aat.platform.hmcts.net
      IDAM_OAUTH2_DATA_STORE_CLIENT_SECRET: ${IDAM_OAUTH2_DATA_STORE_CLIENT_SECRET}
      IDAM_DATA_STORE_SYSTEM_USER_USERNAME: ${IDAM_DATA_STORE_SYSTEM_USER_USERNAME}
      IDAM_DATA_STORE_SYSTEM_USER_PASSWORD: ${IDAM_DATA_STORE_SYSTEM_USER_PASSWORD}
      CASE_DOCUMENT_AM_URL: http://${SERVICE_NAME}-cdam
      ROLE_ASSIGNMENT_URL: http://am-role-assignment-service-aat.service.core-compute-aat.internal
      ELASTIC_SEARCH_ENABLED: true
      ELASTIC_SEARCH_HOSTS: ${SERVICE_NAME}-es-master:9200
      ELASTIC_SEARCH_DATA_NODES_HOSTS: http://${SERVICE_NAME}-es-master:9200
      ENABLE_ATTRIBUTE_BASED_ACCESS_CONTROL: true
      ENABLE_PSEUDO_ROLE_ASSIGNMENTS_GENERATION: true
      ENABLE_PSEUDO_ACCESS_PROFILES_GENERATION: true
      UPLOAD_TIMESTAMP_FEATURED_CASE_TYPES: FinancialRemedyContested, FinancialRemedyMVP2
    ingressHost: ccd-data-store-api-${SERVICE_FQDN}

am-org-role-mapping-service:
  enabled: ${ENABLE_WA}
  java:
    image: hmctsprod.azurecr.io/am/org-role-mapping-service:pr-2772
    disableKeyVaults: true
    ingressHost: am-org-role-mapping-service-${SERVICE_FQDN}
    releaseNameOverride: ${SERVICE_NAME}-am-org-role-mapping-service
    secrets:
      SB_ACCESS_KEY:
        secretRef: financial-remedy-sb-preview
        key: primaryKey
      SB_CONNECTION_STRING:
        secretRef: financial-remedy-sb-preview
        key: connectionString
      ORG_ROLE_MAPPING_DB_PASSWORD:
        secretRef: postgres
        key: PASSWORD
        disabled: false
    keyVaults: []
    devcpuRequests: 500m
    devmemoryRequests: 1Gi
    devcpuLimits: 1
    devmemoryLimits: 4Gi
    imagePullPolicy: Always
    environment:
      ROLE_ASSIGNMENT_URL: http://${SERVICE_NAME}-am-role-assignment-service
      ROLE_ASSIGNMENT_APP_URL: http://${SERVICE_NAME}-am-role-assignment-service
      AMQP_SHARED_ACCESS_KEY_NAME: RootManageSharedAccessKey
      AMQP_HOST: "financial-remedy-servicebus-preview.servicebus.windows.net"
      CRD_SUBSCRIPTION_NAME: "{{ .Release.Name}}-crd-topic"
      JRD_SUBSCRIPTION_NAME: "{{ .Release.Name}}-jrd-topic"
      CRD_TOPIC_NAME: "{{ .Release.Name}}-crd-topic"
      JRD_TOPIC_NAME: "{{ .Release.Name}}-jrd-topic"
      AMQP_CRD_SHARED_ACCESS_KEY_VALUE: "$(SB_ACCESS_KEY)"
      AMQP_JRD_SHARED_ACCESS_KEY_VALUE: "$(SB_ACCESS_KEY)"
      AM_ORG_ROLE_MAPPING_SERVICE_SECRET: ${AM_ORG_ROLE_MAPPING_SERVICE_SECRET}
      ORM_IDAM_CLIENT_ID: ${ORM_IDAM_CLIENT_ID}
      ORG_ROLE_MAPPING_IDAM_CLIENT_SECRET: ${ORG_ROLE_MAPPING_IDAM_CLIENT_SECRET}
      ORG_ROLE_MAPPING_IDAM_ADMIN_PASSWORD: ${ORG_ROLE_MAPPING_IDAM_ADMIN_PASSWORD}
      ORG_ROLE_MAPPING_DB_HOST: financial-remedy-preview.postgres.database.azure.com
      ORG_ROLE_MAPPING_DB_NAME: "pr-${CHANGE_ID}-org-role-mapping"
      ORG_ROLE_MAPPING_DB_USERNAME: hmcts
      ORG_ROLE_MAPPING_DB_PORT: 5432
      ORG_ROLE_MAPPING_DB_OPTIONS: "?stringtype=unspecified&reWriteBatchedInserts=true&sslmode=require"
      TESTING_SUPPORT_ENABLED: true
      REFRESH_BULK_ASSIGNMENT_INCLUDE_BOOKINGS: true
      DB_FEATURE_FLAG_ENABLE: st_cic_wa_1_0
      ORM_ENV: pr

wa:
  enabled: ${ENABLE_WA}
  wa:
    postgresql:
      enabled: false
  global:
    postgresUsername: hmcts
    postgresSecret: postgres
    postgresHost: financial-remedy-preview.postgres.database.azure.com
    databaseNamePrefix: "pr-${CHANGE_ID}-"

  camunda-bpm:
    java:
      ingressHost: camunda-${SERVICE_FQDN}
      devcpuRequests: 500m
      devmemoryRequests: 1Gi
      devcpuLimits: 2
      devmemoryLimits: 4Gi
      environment:
        CAMUNDA_DB_CONN_OPTIONS: "?stringtype=unspecified&reWriteBatchedInserts=true&sslmode=require"

  wa-task-management-api:
    java:
      disableKeyVaults: true
      ingressHost: wa-task-management-api-${SERVICE_FQDN}
      devcpuRequests: 500m
      devmemoryRequests: 1Gi
      devcpuLimits: 2
      devmemoryLimits: 4Gi
      environment:
        CAMUNDA_URL: "http://{{ .Release.Name }}-camunda/engine-rest"
        IDAM_URL: "https://idam-api.{{ .Values.global.environment }}.platform.hmcts.net"
        S2S_URL: "http://rpe-service-auth-provider-{{ .Values.global.environment }}.service.core-compute-{{ .Values.global.environment }}.internal"
        OPEN_ID_IDAM_URL: "https://idam-web-public.{{ .Values.global.environment }}.platform.hmcts.net"
        ROLE_ASSIGNMENT_URL: http://${SERVICE_NAME}-am-role-assignment-service
        ALLOWED_JURISDICTIONS: wa,divorce
        ALLOWED_CASE_TYPES: financialremedymvp2,financialremedycontested
        LAUNCH_DARKLY_SDK_KEY: ${WA_LAUNCH_DARKLY_SDK_KEY}
        MANDATORY_TASK_FIELD_CHECK_ENABLED: true
        S2S_SECRET_TASK_MANAGEMENT_API: ${S2S_SECRET_TASK_MANAGEMENT_API}
        WA_IDAM_CLIENT_SECRET: ${WA_IDAM_CLIENT_SECRET}
        WA_SYSTEM_PASSWORD: ${WA_SYSTEM_PASSWORD}
        WA_SYSTEM_USERNAME: ${WA_SYSTEM_USERNAME}

  wa-case-event-handler:
    java:
      disableKeyVaults: true
      ingressHost: wa-case-event-handler-${SERVICE_FQDN}
      releaseNameOverride: ${SERVICE_NAME}-wa-case-event-handler
      secrets:
        AZURE_SERVICE_BUS_CONNECTION_STRING:
          secretRef: financial-remedy-sb-preview
          key: connectionString
      devcpuRequests: 500m
      devmemoryRequests: 1Gi
      devcpuLimits: 2
      devmemoryLimits: 4Gi
      environment:
        CAMUNDA_URL: "http://{{ .Release.Name }}-camunda/engine-rest"
        CCD_URL: "http://{{ .Release.Name }}-ccd-data-store-api"
        CCD_SEARCH_URL: "http://{{ .Release.Name }}-ccd-data-store-api"
        LAUNCH_DARKLY_SDK_KEY: ${WA_LAUNCH_DARKLY_SDK_KEY}
        ROLE_ASSIGNMENT_URL: http://${SERVICE_NAME}-am-role-assignment-service
        S2S_SECRET_CASE_EVENT_HANDLER: ${S2S_SECRET_CASE_EVENT_HANDLER}
        WA_WORKFLOW_API_URL: "http://{{ .Release.Name }}-wa-workflow-api"
        WA_TASK_MANAGEMENT_API_URL: "http://{{ .Release.Name }}-wa-task-management-api"
        WA_IDAM_CLIENT_SECRET: ${WA_IDAM_CLIENT_SECRET}
        AZURE_SERVICE_BUS_TOPIC_NAME: ${SERVICE_NAME}-ccd-case-events
        AZURE_SERVICE_BUS_SUBSCRIPTION_NAME: ${SERVICE_NAME}-ccd-case-events
        AZURE_SERVICE_BUS_CCD_CASE_EVENTS_SUBSCRIPTION_NAME: ${SERVICE_NAME}-ccd-case-events

  wa-task-monitor:
    java:
      disableKeyVaults: true
      ingressHost: wa-task-monitor-${SERVICE_FQDN}
      environment:
        S2S_SECRET_TASK_MONITOR: ${S2S_SECRET_TASK_MONITOR}
        WA_IDAM_CLIENT_SECRET: ${WA_IDAM_CLIENT_SECRET}
        WA_SYSTEM_PASSWORD: ${WA_SYSTEM_PASSWORD}
        WA_SYSTEM_USERNAME: ${WA_SYSTEM_USERNAME}
        WA_TASK_MANAGEMENT_API_URL: http://{{ .Release.Name }}-wa-task-management-api

  wa-workflow-api:
    java:
      disableKeyVaults: true
      devcpuRequests: 500m
      devmemoryRequests: 1Gi
      devcpuLimits: 2
      devmemoryLimits: 4Gi
      environment:
        DB_READER_USERNAME: "hmcts"
        LAUNCH_DARKLY_SDK_KEY: ${WA_LAUNCH_DARKLY_SDK_KEY}
        S2S_SECRET_WORKFLOW_API: ${S2S_SECRET_WORKFLOW_API}
  wa-message-cron-service:
    java:
      ingressHost: wa-msg-cron-svc-${SERVICE_FQDN}
    job:
      schedule: "*/1 * * * *"

  wa-initiation-batch:
    job:
      schedule: "*/1 * * * *"
      releaseNameOverride: "{{ .Release.Name }}-wa-task-batch"

  wa-reconfiguration-batch:
    job:
      schedule: "*/1 * * * *"
      releaseNameOverride: "{{ .Release.Name }}-reconfiguration"

  wa-termination-batch:
    job:
      schedule: "*/1 * * * *"
      releaseNameOverride: "{{ .Release.Name }}-termination-batch"


ccd:
  ccd:
    definitionImporter:
      enabled: false
    managementWeb:
      enabled: false
    apiGatewayWeb:
      enabled: true
    s2s:
      enabled: false
    printService:
      enabled: true
    elastic:
      enabled: true
    ras:
      enabled: true
  ccd-data-store-api:
    java:
      environment:
        ROLE_ASSIGNMENT_URL: http://${SERVICE_NAME}-am-role-assignment-service
  am-role-assignment-service:
    java:
      image: hmctsprod.azurecr.io/am/role-assignment-service:pr-2733
      imagePullPolicy: Always
      disableKeyVaults: true
      devmemoryRequests: 1024Mi
      devcpuRequests: 500m
      devmemoryLimits: 2048Mi
      devcpuLimits: 1500m
      ingressHost: am-role-assignment-service-${SERVICE_FQDN}
      autoscaling:
        enabled: false
        minReplicas: 1
        maxReplicas: 1
      environment:
        AM_ROLE_ASSIGNMENT_SERVICE_SECRET: ${AM_ROLE_ASSIGNMENT_SERVICE_SECRET}
        APPLICATION_LOGGING_LEVEL: TRACE
        CCD_DATA_STORE_URL: http://${SERVICE_NAME}-ccd-data-store-api
        LD_SDK_KEY: ${LD_SDK_AM_KEY}
        ROLE_ASSIGNMENT_IDAM_ADMIN_PASSWORD: ${ROLE_ASSIGNMENT_IDAM_ADMIN_PASSWORD}
        ROLE_ASSIGNMENT_IDAM_CLIENT_SECRET: ${ROLE_ASSIGNMENT_IDAM_CLIENT_SECRET}
        RUN_LD_ON_STARTUP: false
      keyVaults: [ ]
      secrets:
        ROLE_ASSIGNMENT_DB_PASSWORD:
          secretRef: postgres
          key: PASSWORD

servicebusPrimary:
  enabled: true
  releaseNameOverride: ${SERVICE_NAME}
  resourceGroup: financial-remedy-aso-preview-rg
  sbNamespace: financial-remedy-servicebus-preview
  azureName: financial-remedy-sb-preview
  secretName: financial-remedy-sb-preview
  setup:
    topics:
      - name: ccd-case-events
        subscriptionNeeded: yes
        requiresSession: true

ccd-message-publisher:
  enabled: true
  servicebusPrimary:
    enabled: false
  java:
    ingressHost: ccd-message-publisher-${SERVICE_FQDN}
    releaseNameOverride: ${SERVICE_NAME}-ccd-message-publisher
    disableKeyVaults: true
    devcpuRequests: 500m
    devmemoryRequests: 1Gi
    devcpuLimits: 1
    devmemoryLimits: 4Gi
    environment:
      DATA_STORE_DB_HOST: financial-remedy-preview.postgres.database.azure.com
      DATA_STORE_DB_NAME: "pr-${CHANGE_ID}-data-store"
      DATA_STORE_DB_USERNAME: hmcts
      DATA_STORE_DB_OPTIONS: "?stringtype=unspecified&reWriteBatchedInserts=true&sslmode=require"
      CCD_CASE_EVENTS_DESTINATION: ${SERVICE_NAME}-ccd-case-events
    secrets:
      SERVICE_BUS_CONNECTION_STRING:
        secretRef: financial-remedy-sb-preview
        key: connectionString
      DATA_STORE_DB_PASSWORD:
        secretRef: postgres
        key: PASSWORD
        disabled: false
